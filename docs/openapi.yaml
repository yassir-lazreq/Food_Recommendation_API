openapi: 3.0.3
info:
  title: Food Recommendation API
  version: 1.0.0
  description: |
    REST API for food catalog management and AI-based recommendation workflows.
    Authentication is based on Laravel Sanctum Bearer tokens.
servers:
  - url: http://127.0.0.1:8000
    description: Local artisan server
  - url: http://localhost/projects/Food_Recommendation_API/public
    description: Local Apache server

tags:
  - name: Auth
  - name: Profile
  - name: Categories
  - name: Plates
  - name: AI
  - name: Recommendations
  - name: Admin
  - name: Ingredients

paths:
  /api/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation, role]
              properties:
                name: { type: string, maxLength: 255 }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                password_confirmation: { type: string }
                role:
                  type: string
                  enum: [client, admin]
                dietary_tags:
                  type: array
                  items:
                    $ref: '#/components/schemas/DietaryTag'
      responses:
        '201':
          description: User created
  /api/login:
    post:
      tags: [Auth]
      summary: Login and issue Bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Logged in
        '401':
          description: Invalid credentials

  /api/logout:
    post:
      tags: [Auth]
      summary: Revoke current token / session
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Logout successful }

  /api/me:
    get:
      tags: [Auth]
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Current user object }

  /api/profile:
    get:
      tags: [Profile]
      summary: Get user dietary tags
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Profile tags }
    put:
      tags: [Profile]
      summary: Update user dietary tags
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dietary_tags]
              properties:
                dietary_tags:
                  type: array
                  items:
                    $ref: '#/components/schemas/DietaryTag'
      responses:
        '200': { description: Updated profile }

  /api/categories:
    get:
      tags: [Categories]
      summary: List categories
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: active
          schema: { type: boolean }
      responses:
        '200': { description: Category list }
    post:
      tags: [Categories]
      summary: Create category (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryInput'
      responses:
        '201': { description: Category created }

  /api/categories/{category}:
    get:
      tags: [Categories]
      summary: Get category by id
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '200': { description: Category details }
    put:
      tags: [Categories]
      summary: Update category (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryInput'
      responses:
        '200': { description: Category updated }
    delete:
      tags: [Categories]
      summary: Delete category (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '200': { description: Category deleted }
        '422': { description: Category still has active plates }

  /api/categories/{category}/plates:
    get:
      tags: [Categories]
      summary: List plates in a category
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/CategoryId'
        - in: query
          name: is_available
          schema: { type: boolean }
      responses:
        '200': { description: Plates with recommendation projection }

  /api/plates:
    get:
      tags: [Plates]
      summary: List plates
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: is_available
          schema: { type: boolean }
      responses:
        '200': { description: Plate list with recommendation projection }
    post:
      tags: [Plates]
      summary: Create plate (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlateInput'
      responses:
        '201': { description: Plate created }

  /api/plates/{plate}:
    get:
      tags: [Plates]
      summary: Get a plate
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PlateId'
      responses:
        '200': { description: Plate details and latest recommendation }
    put:
      tags: [Plates]
      summary: Update a plate (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PlateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlateInput'
      responses:
        '200': { description: Plate updated }
    delete:
      tags: [Plates]
      summary: Delete a plate (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PlateId'
      responses:
        '200': { description: Plate deleted }

  /api/ai/recommendations:
    get:
      tags: [AI]
      summary: Get top AI recommendations
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: plate_ids[]
          schema:
            type: array
            items: { type: integer }
      responses:
        '200': { description: Recommendation list }

  /api/recommendations/analyze/{plate_id}:
    post:
      tags: [Recommendations]
      summary: Trigger asynchronous analysis for one plate
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: plate_id
          required: true
          schema: { type: integer }
      responses:
        '202': { description: Job accepted, status processing }

  /api/recommendations:
    get:
      tags: [Recommendations]
      summary: List recommendation history of current user
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: History list }

  /api/recommendations/{plate_id}:
    get:
      tags: [Recommendations]
      summary: Get latest recommendation for one plate
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: plate_id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Latest recommendation }
        '404': { description: No recommendation found }

  /api/admin/stats:
    get:
      tags: [Admin]
      summary: Get admin dashboard stats
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Aggregated stats }

  /api/ingredients:
    get:
      tags: [Ingredients]
      summary: List ingredients (admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Ingredient list }
    post:
      tags: [Ingredients]
      summary: Create ingredient (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientInput'
      responses:
        '201': { description: Ingredient created }

  /api/ingredients/{ingredient}:
    put:
      tags: [Ingredients]
      summary: Update ingredient (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IngredientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientInput'
      responses:
        '200': { description: Ingredient updated }
    delete:
      tags: [Ingredients]
      summary: Delete ingredient (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IngredientId'
      responses:
        '200': { description: Ingredient deleted }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  parameters:
    CategoryId:
      in: path
      name: category
      required: true
      schema: { type: integer }
    PlateId:
      in: path
      name: plate
      required: true
      schema: { type: integer }
    IngredientId:
      in: path
      name: ingredient
      required: true
      schema: { type: integer }

  schemas:
    DietaryTag:
      type: string
      enum: [vegan, no_sugar, no_cholesterol, gluten_free, no_lactose]
    IngredientTag:
      type: string
      enum: [contains_meat, contains_sugar, contains_cholesterol, contains_gluten, contains_lactose]
    CategoryInput:
      type: object
      properties:
        name: { type: string, maxLength: 100 }
        description: { type: string, nullable: true }
        color: { type: string, example: '#10B981' }
        is_active: { type: boolean }
    PlateInput:
      type: object
      properties:
        name: { type: string, maxLength: 100 }
        description: { type: string, nullable: true }
        price: { type: number, format: float }
        image: { type: string, nullable: true }
        is_available: { type: boolean }
        category_id: { type: integer }
        ingredient_ids:
          type: array
          items: { type: integer }
    IngredientInput:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        tags:
          type: array
          items:
            $ref: '#/components/schemas/IngredientTag'
